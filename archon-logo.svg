<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>

    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#1d1d1d"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>

    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#d6d6d6"/>
      <stop offset="55%"  stop-color="#9a9a9a"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="28"/>

  <!-- Outer ring -->
  <circle cx="200" cy="194" r="170" fill="none" stroke="#222222" stroke-width="1"/>
  <!-- Inner ring -->
  <circle cx="200" cy="194" r="152" fill="none" stroke="#161616" stroke-width="0.8"/>

  <!-- Corner bracket accents -->
  <polyline points="18,48 18,18 48,18"   fill="none" stroke="#2e2e2e" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="352,18 382,18 382,48" fill="none" stroke="#2e2e2e" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="18,352 18,382 48,382" fill="none" stroke="#2e2e2e" stroke-width="1.8" stroke-linecap="round"/>
  <polyline points="352,382 382,382 382,352" fill="none" stroke="#2e2e2e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- AC letters -->
  <text
    x="200" y="242"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-size="172"
    font-weight="900"
    fill="url(#letterGrad)"
    text-anchor="middle"
    letter-spacing="-8"
    filter="url(#softGlow)">AC</text>

  <!-- Gold accent line -->
  <rect x="146" y="260" width="108" height="1.4" fill="#c9a84c" opacity="0.5" rx="1"/>

  <!-- ARCHON wordmark -->
  <text
    x="200" y="283"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    font-weight="300"
    fill="#353535"
    text-anchor="middle"
    letter-spacing="7.5">ARCHON</text>

</svg>
